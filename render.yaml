services:
  - type: web
    name: ai-resume-pro
    env: python
    plan: free
    pythonVersion: 3.11
    
    buildCommand: |
      pip install -r requirements.txt && \
      python -m nltk.downloader punkt
    
    startCommand: |
      gunicorn --bind 0.0.0.0:$PORT \
      --workers 1 \
      --worker-class sync \
      --max-requests 10 \
      --max-requests-jitter 2 \
      --timeout 120 \
      --worker-tmp-dir /dev/shm \
      --access-logfile - \
      --error-logfile - \
      wsgi:app
    
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: GOOGLE_API_KEY
        scope: secret
